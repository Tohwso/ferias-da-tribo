<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Férias{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">🏖️ Férias</a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Agenda</a>
                <a href="/teams" class="nav-link {% if request.url.path == '/teams' %}active{% endif %}">Times</a>
                <a href="/people" class="nav-link {% if request.url.path == '/people' %}active{% endif %}">Pessoas</a>
                <a href="/vacations" class="nav-link {% if request.url.path == '/vacations' %}active{% endif %}">Férias</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="toast-container"></div>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>Sistema de Férias — Gestão de times v1.0</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
