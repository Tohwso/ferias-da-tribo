# Secret para a connection string do PostgreSQL
# NÃO commitar este arquivo — é só template.
# Em produção, usar Vault ou sealed-secrets.
#
# Para criar o secret:
#   kubectl create secret generic ferias-da-tribo-db \
#     --namespace=feriasdatribo \
#     --from-literal=url='postgresql://ferias_user:SENHA@HOST:5432/ferias_db'

apiVersion: v1
kind: Secret
metadata:
  name: ferias-da-tribo-db
  namespace: feriasdatribo
type: Opaque
stringData:
  url: "postgresql://ferias_user:CHANGE_ME@rds-host.picpay.internal:5432/ferias_db"
