version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ferias_user:ferias_pass@db:5432/ferias_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ferias_user
      POSTGRES_PASSWORD: ferias_pass
      POSTGRES_DB: ferias_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferias_user -d ferias_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
